<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tipos de Dados</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f8fafc;
}

.fade {
  transition: all 0.3s ease;
}
</style>
</head>

<body class="p-6">

<div class="max-w-4xl mx-auto">

<h1 class="text-3xl font-black text-center mb-8 text-indigo-800 uppercase">
Tipos de Dados
</h1>

<p class="text-center text-gray-600 mb-8">
Clique em um tipo de dado para visualizar suas características.
</p>

<!-- BOTÕES -->
<div class="flex flex-wrap justify-center gap-3 mb-8">

<button onclick="mostrar('qual')" class="bg-green-100 text-green-800 px-4 py-2 rounded hover:bg-green-200">Qualitativos</button>

<button onclick="mostrar('quant')" class="bg-indigo-100 text-indigo-800 px-4 py-2 rounded hover:bg-indigo-200">Quantitativos</button>

<button onclick="mostrar('prim')" class="bg-yellow-100 text-yellow-800 px-4 py-2 rounded hover:bg-yellow-200">Primários</button>

<button onclick="mostrar('sec')" class="bg-red-100 text-red-800 px-4 py-2 rounded hover:bg-red-200">Secundários</button>

<button onclick="mostrar('nom')" class="bg-blue-100 text-blue-800 px-4 py-2 rounded hover:bg-blue-200">Nominais / Categóricos</button>

<button onclick="mostrar('ord')" class="bg-pink-100 text-pink-800 px-4 py-2 rounded hover:bg-pink-200">Ordinais</button>

<button onclick="mostrar('rat')" class="bg-lime-100 text-lime-800 px-4 py-2 rounded hover:bg-lime-200">Racionais</button>

<button onclick="mostrar('int')" class="bg-orange-100 text-orange-800 px-4 py-2 rounded hover:bg-orange-200">Intervalares</button>

</div>

<!-- CAIXA DE CONTEÚDO -->
<div id="caixa" class="bg-white p-6 rounded-lg shadow border border-gray-200 min-h-[200px]">

<h2 id="titulo" class="text-xl font-bold text-indigo-700 mb-4">
Selecione um tipo acima 👆
</h2>

<div id="conteudo" class="text-gray-700 leading-relaxed space-y-3"></div>

</div>

</div>

<script>

const dados = {
qual: `
<strong>Qualitativos:</strong><br>
• Entender o problema com profundidade e criar categorias e grupos.<br>
• Característica complexa dos dados pode complicar a análise.<br>
<br><strong>Exemplos:</strong> Gênero, país de origem, conteúdo dos comentários, vídeos, imagens, áudios.
`,

quant: `
<strong>Quantitativos:</strong><br>
• Quantificar e relacionar fenômenos por meio de análises estatísticas.<br>
• Informações complexas podem não ser captadas.<br>
<br><strong>Exemplos:</strong> Volume de vendas, faturamento, notas de satisfação, número de funcionários, curtidas.
`,

prim: `
<strong>Primários:</strong><br>
• Dados coletados para um fim específico.<br>
• Alto uso de tempo e recursos para coleta.<br>
<br><strong>Exemplos:</strong> Pesquisas de satisfação, dados de tráfego, dados de compra.
`,

sec: `
<strong>Secundários:</strong><br>
• Dados coletados para outro fim que não a análise a ser realizada.<br>
• Limitados pela disponibilidade e formato dos dados.<br>
<br><strong>Exemplos:</strong> Dados do IBGE, dados de inovação OECD, dados de agências de fomento ou setoriais.
`,

nom: `
<strong>Nominais ou Categóricos:</strong><br>
• Essencialmente qualitativos.<br>
• Utilizados para nomear atributos.<br>
<br><strong>Exemplos:</strong> Departamento, país, cidade, gênero, tipo de produto, forma de pagamento.
`,

ord: `
<strong>Ordinais:</strong><br>
• Qualitativos ou quantitativos.<br>
• Pressupõem ordem ou hierarquia.<br>
<br><strong>Exemplos:</strong> Extratos de renda (baixa, média, alta), faixas salariais, fases de processo.
`,

rat: `
<strong>Racionais:</strong><br>
• Possuem ordem.<br>
• Contam com zero absoluto (partem do zero).<br>
<br><strong>Exemplos:</strong> Renda, ticket médio, preço, número de funcionários, idade, volume de vendas.
`,

int: `
<strong>Intervalares:</strong><br>
• Possuem ordem e distância equivalente.<br>
• Sem zero absoluto (variam de −∞ a +∞).<br>
<br><strong>Exemplos:</strong> Lucro, temperatura, variação de preço.
`
};

function mostrar(tipo) {
document.getElementById("titulo").textContent = "";
document.getElementById("conteudo").innerHTML = dados[tipo];
}

</script>

</body>
</html>
